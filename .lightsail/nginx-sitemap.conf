server {
    listen 80;
    server_name agarwalacademy.in www.agarwalacademy.in;
    
    root /var/www/html;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/xml;
    
    # Serve sitemap.xml with correct MIME type
    location = /sitemap.xml {
        default_type application/xml;
        add_header Content-Type "application/xml; charset=UTF-8";
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
    
    # Serve robots.txt
    location = /robots.txt {
        default_type text/plain;
        add_header Content-Type "text/plain; charset=UTF-8";
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Handle React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
