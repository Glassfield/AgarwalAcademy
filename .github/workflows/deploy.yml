name: Build & Deploy to Lightsail

on:
  push:
    branches:
      - main   # runs automatically on every push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Create .env file from GitHub Secrets
      - name: Create .env file
        run: |
          cat > .env << EOF
          VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_ADMIN_USERNAME=${{ vars.VITE_ADMIN_USERNAME }}
          VITE_ADMIN_PASSWORD=${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_CONTACT_PHONE=${{ vars.VITE_CONTACT_PHONE }}
          VITE_CONTACT_EMAIL=${{ vars.VITE_CONTACT_EMAIL }}
          VITE_INQUIRY_EMAIL=${{ vars.VITE_INQUIRY_EMAIL }}
          VITE_ADMIN_EMAIL=${{ vars.VITE_ADMIN_EMAIL }}
          EOF

      # 5. Build production bundle
      - name: Build
        run: npm run build

      # 6. Deploy dist/ to server via SSH
      - name: Deploy frontend to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/"
          target: "/home/admin/agarwal-academy/dist"
          strip_components: 1   # copies contents of dist/ not the folder itself

      # 6b. Deploy backend files to server
      - name: Deploy backend to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend/"
          target: "/home/admin/agarwal-academy/backend"
          strip_components: 1

      # 7. Run seed script on server (clears old options and reseeds fresh)
      - name: Seed database options
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: cd /home/admin/agarwal-academy && npm install --prefix backend --omit=dev && node backend/seed-options.js && pm2 restart backend

      # 8. Reload Nginx on the server
      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: sudo systemctl reload nginx
